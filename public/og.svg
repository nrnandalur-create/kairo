<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Background gradient: deep green-tinted black to a slightly lighter card tone -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c0a"/>
      <stop offset="100%" stop-color="#0a100c"/>
    </linearGradient>

    <!-- Subtle radial brand glow behind the title -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%"   stop-color="#1D9E75" stop-opacity="0.22"/>
      <stop offset="60%"  stop-color="#1D9E75" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/>
    </radialGradient>

    <!-- Mountain chart area fill -->
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1D9E75" stop-opacity="0.45"/>
      <stop offset="60%"  stop-color="#1D9E75" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/>
    </linearGradient>

    <!-- Neon glow for the mountain stroke -->
    <filter id="lineGlow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Static grid that reads as a chart viewport -->
  <g stroke="#1D9E75" stroke-width="0.6" stroke-opacity="0.07" stroke-dasharray="3 5">
    <line x1="0" y1="158" x2="1200" y2="158"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Ambient brand glow behind the title -->
  <ellipse cx="600" cy="290" rx="480" ry="220" fill="url(#glow)"/>

  <!-- Mountain chart at the bottom — the iconic Robinhood/Yahoo silhouette -->
  <path
    d="M0,520 C70,495 140,490 210,475 C280,460 350,470 420,430 C490,395 560,410 630,370 C700,335 770,360 840,335 C910,310 980,330 1050,290 C1120,255 1180,265 1200,250 L1200,630 L0,630 Z"
    fill="url(#area)"/>
  <path
    d="M0,520 C70,495 140,490 210,475 C280,460 350,470 420,430 C490,395 560,410 630,370 C700,335 770,360 840,335 C910,310 980,330 1050,290 C1120,255 1180,265 1200,250"
    stroke="#1D9E75" stroke-width="2.5" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#lineGlow)"/>

  <!-- Logo: filled mark consistent with KairoLogo's shape -->
  <g transform="translate(96, 110)">
    <!-- Brand mark — a stylized 'k' on a brand-green tile -->
    <rect x="0" y="0" width="56" height="56" rx="14" fill="#1D9E75"/>
    <path d="M16 12 L16 44 M16 30 L34 12 M16 30 L34 44" stroke="#080c0a" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Main heading -->
  <text x="96" y="270" font-size="92" font-weight="900" fill="#ffffff" letter-spacing="-2">
    Kairo
  </text>
  <text x="96" y="320" font-size="20" font-weight="700" fill="#1D9E75" letter-spacing="8">
    KNOW THE MOMENT.
  </text>

  <!-- Subhead -->
  <text x="96" y="382" font-size="32" font-weight="500" fill="#d1d9d5" letter-spacing="-0.5">
    Real-time stock analysis with AI.
  </text>

  <!-- Feature row — small pill chips like the app uses -->
  <g font-size="15" font-weight="700" letter-spacing="2" fill="#8a9b91">
    <g transform="translate(96, 432)">
      <rect x="0" y="0" width="166" height="34" rx="17" fill="#0a100c" stroke="#1a2e1f" stroke-width="1.2"/>
      <circle cx="18" cy="17" r="3" fill="#1D9E75"/>
      <text x="32" y="22">LIVE MARKET DATA</text>
    </g>
    <g transform="translate(278, 432)">
      <rect x="0" y="0" width="160" height="34" rx="17" fill="#0a100c" stroke="#1a2e1f" stroke-width="1.2"/>
      <circle cx="18" cy="17" r="3" fill="#1D9E75"/>
      <text x="32" y="22">AI RECOMMENDATIONS</text>
    </g>
    <g transform="translate(454, 432)">
      <rect x="0" y="0" width="150" height="34" rx="17" fill="#0a100c" stroke="#1a2e1f" stroke-width="1.2"/>
      <circle cx="18" cy="17" r="3" fill="#1D9E75"/>
      <text x="32" y="22">TECHNICAL SIGNALS</text>
    </g>
  </g>

  <!-- Status pill in the top right — mimics the live MarketStatusPill -->
  <g transform="translate(940, 96)">
    <rect x="0" y="0" width="170" height="36" rx="18" fill="#0a100c" stroke="#1a2e1f" stroke-width="1.5"/>
    <circle cx="20" cy="18" r="4.5" fill="#1D9E75"/>
    <text x="36" y="23" font-size="13" font-weight="700" letter-spacing="2.2" fill="#1D9E75">MARKET OPEN</text>
  </g>

  <!-- Domain footer — confirms the source -->
  <text x="96" y="560" font-size="14" font-weight="600" letter-spacing="2.5" fill="#5d7868">
    KAIRO-IOTA-RED.VERCEL.APP
  </text>
</svg>
